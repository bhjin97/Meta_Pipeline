services:
  spark-master:
    build: .
    image: apache/spark:3.5.1
    container_name: spark-master
    env_file:
      - .env
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "18080:8080"
      - "7077:7077"
    environment:
      - SPARK_SUBMIT_OPTS=-Divy.home=/opt/spark/.ivy2 -Divy.cache.dir=/opt/spark/.ivy2/cache
    volumes:
      - ../:/app
      - spark-ivy:/opt/spark/.ivy2
    networks:
      - data-pipeline-net
    cpus: 0.5
    mem_limit: 2g

  spark-worker:
    build: .
    image: apache/spark:3.5.1
    container_name: spark-worker
    env_file:
      - .env    
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=6G
      - SPARK_SUBMIT_OPTS=-Divy.home=/opt/spark/.ivy2 -Divy.cache.dir=/opt/spark/.ivy2/cache
    volumes:
      - ../:/app
      - spark-ivy:/opt/spark/.ivy2
    networks:
      - data-pipeline-net
    cpus: 2
    mem_limit: 9g


  spark-streaming:
    build: .
    image: apache/spark:3.5.1
    container_name: spark-streaming
    env_file:
      - .env
    depends_on:
      - spark-master
      - spark-worker
    command: ["/app/spark/scripts/run_streaming.sh"]
    volumes:
      - ../:/app
      - spark-ivy:/opt/spark/.ivy2
    networks:
      - data-pipeline-net
    cpus: 0.5
    mem_limit: 1536m
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - data-pipeline-net
    volumes:
      - redis-data:/data
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--maxmemory", "512mb",
        "--maxmemory-policy", "allkeys-lru"
      ]
    cpus: 0.5
    mem_limit: 768m

  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - data-pipeline-net
    cpus: 0.75
    mem_limit: 2g

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    networks:
      - data-pipeline-net
    volumes:
      - metabase-data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1G"
    cpus: 0.5
    mem_limit: 1536m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - redis
    ports:
      - "3001:3000"
    environment:
      GF_INSTALL_PLUGINS: redis-datasource
    networks:
      - data-pipeline-net
    volumes:
      - grafana-data:/var/lib/grafana
    cpus: 0.25
    mem_limit: 512m

networks:
  data-pipeline-net:
    external: true

volumes:
  spark-ivy:
  redis-data:
  postgres-data:
  metabase-data:
  grafana-data: