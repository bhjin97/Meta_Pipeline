services:
  spark-master:
    build: .
    image: apache/spark:3.5.1
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "18080:8080"
      - "7077:7077"
    environment:
      - SPARK_SUBMIT_OPTS=-Divy.home=/opt/spark/.ivy2 -Divy.cache.dir=/opt/spark/.ivy2/cache      
    volumes:
      - ../:/app
      - spark-ivy:/opt/spark/.ivy2
    networks:
      - data-pipeline-net
    cpus: 0.5
    mem_limit: 1g

  spark-worker:
    build: .
    image: apache/spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=6G
      - SPARK_SUBMIT_OPTS=-Divy.home=/opt/spark/.ivy2 -Divy.cache.dir=/opt/spark/.ivy2/cache
    volumes:
      - ../:/app
      - spark-ivy:/opt/spark/.ivy2
    networks:
      - data-pipeline-net
    cpus: 2.0
    mem_limit: 7g

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - data-pipeline-net
    volumes:
      - redis-data:/data
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--maxmemory", "512mb",
        "--maxmemory-policy", "allkeys-lru"
      ]
    cpus: 0.5
    mem_limit: 768m

  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - data-pipeline-net
    cpus: 0.5
    mem_limit: 1g

networks:
  data-pipeline-net:
    external: true

volumes:
  spark-ivy:
  redis-data:
  postgres-data: